name: Daily News Summary Reporter

on:
  schedule:
    # 05:00 UTC represents 08:00 TSI (Turkey Standard Time, UTC+3)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies for Weasyprint
      run: |
        sudo apt-get update
        sudo apt-get install -y libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run News Summary & Email Pipeline
      env:
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: |
        python main.py
